    <h1>Color Calming</h1>
    <p>Choose a color and let it fill the screen. Gentle pulse for deep relaxation. Great for anxiety and overwhelm.</p>
    <p id="color-stats" style="font-size:0.85rem;opacity:0.5;margin-bottom:1rem;"></p>

    <div class="picker-area" id="preset-colors">
      <div class="color-swatch" style="background:#4a7c7f" data-color="#4a7c7f"></div>
      <div class="color-swatch" style="background:#2563eb" data-color="#2563eb"></div>
      <div class="color-swatch" style="background:#16a34a" data-color="#16a34a"></div>
      <div class="color-swatch" style="background:#7c3aed" data-color="#7c3aed"></div>
      <div class="color-swatch" style="background:#db2777" data-color="#db2777"></div>
      <div class="color-swatch" style="background:#ea580c" data-color="#ea580c"></div>
      <div class="color-swatch" style="background:#0891b2" data-color="#0891b2"></div>
      <div class="color-swatch" style="background:#1c1917" data-color="#1c1917"></div>
    </div>

    <div class="custom-row">
      <label style="font-size:.85rem;opacity:.7">Custom:</label>
      <input type="color" id="custom-color" value="#4a7c7f">
    </div>

    <div class="control-row">
      <label for="duration">Duration:</label>
      <select id="duration">
        <option value="1">1 min</option>
        <option value="2">2 min</option>
        <option value="5" selected>5 min</option>
        <option value="10">10 min</option>
      </select>
      <label for="pulse">Pulse:</label>
      <select id="pulse">
        <option value="0">Off</option>
        <option value="1" selected>Slow</option>
        <option value="2">Medium</option>
      </select>
    </div>

    <div class="timer-display" id="timer-display">--:--</div>
    <div class="status-text" id="status-text">Choose a color and press Start</div>

    <div class="btn-row">
      <button id="start-session" class="btn btn-start">Start Session</button>

<script>
(function(){
var overlay = document.getElementById('color-overlay');
var currentColor = '#4a7c7f';
var active = false, remaining = 0, totalDuration = 0;
var timerInterval = null, pulseInterval = null;
var pulseSpeeds = [0, 3000, 1500];

function ls(k, v) { try { if (v === undefined) return JSON.parse(localStorage.getItem('color-' + k)); localStorage.setItem('color-' + k, JSON.stringify(v)); } catch(e) {} }

function setColor(color) {
  currentColor = color;
  overlay.style.background = color;
  document.querySelectorAll('.color-swatch').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-color') === color);
  });
  ls('last', color);
}

function startPulse(speed) {
  if (speed === 0) return;
  var bright = true;
  pulseInterval = setInterval(function() {
    bright = !bright;
    overlay.style.opacity = bright ? '1' : '0.85';
  }, speed);
}

function stopPulse() {
  if (pulseInterval) { clearInterval(pulseInterval); pulseInterval = null; }
  overlay.style.opacity = '1';
}

function startSession() {
  var mins = parseInt(document.getElementById('duration').value);
  var pulseSpeed = pulseSpeeds[parseInt(document.getElementById('pulse').value)];
  totalDuration = mins * 60;
  remaining = totalDuration;
  active = true;

  document.getElementById('start-session').style.display = 'none';
  document.getElementById('stop-session').style.display = 'inline-block';
  document.getElementById('status-text').textContent = 'Session in progress...';

  setColor(currentColor);
  startPulse(pulseSpeed);
  updateTimer();

  timerInterval = setInterval(function() {
    remaining--;
    updateTimer();
    if (remaining <= 0) { endSession(); }
  }, 1000);
}

function updateTimer() {
  var m = Math.floor(remaining / 60);
  var s = remaining % 60;
  document.getElementById('timer-display').textContent =
    (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

function endSession() {
  active = false;
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  stopPulse();
  document.getElementById('start-session').style.display = 'inline-block';
  document.getElementById('stop-session').style.display = 'none';
  document.getElementById('status-text').textContent = 'Session complete. Breathe slowly.';
  document.getElementById('timer-display').textContent = '00:00';
  var mins = ls('minutes') || 0;
  ls('minutes', mins + Math.floor(totalDuration / 60));
  ls('last-visit', new Date().toISOString());
  var el = document.getElementById('color-stats');
  if (el) el.textContent = 'Total relaxation time: ' + (ls('minutes') || 0) + ' minutes';
}

function stopSession() {
  if (!active) return;
  endSession();
}

document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.color-swatch').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var color = this.getAttribute('data-color');
      setColor(color);
      document.getElementById('custom-color').value = color;
    });
  });
  document.getElementById('custom-color').addEventListener('input', function() {
    setColor(this.value);
  });
  document.getElementById('start-session').addEventListener('click', startSession);
  document.getElementById('stop-session').addEventListener('click', stopSession);
  var savedColor = ls('last');
  if (savedColor) { setColor(savedColor); document.getElementById('custom-color').value = savedColor; }
  else { setColor('#4a7c7f'); }
  ls('last-visit', new Date().toISOString());
  var el = document.getElementById('color-stats');
  if (el) el.textContent = 'Total relaxation time: ' + (ls('minutes') || 0) + ' minutes';
});
})();
</script>
